<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta | Noty</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-page">
  <main class="auth-card">
    <a
      class="brand-link"
      href="index.html"
      aria-label="Volver al inicio de Noty"
    >
      Noty
    </a>

    <div class="auth-heading">
      <p class="eyebrow">Comienza a organizar tus ideas</p>
      <h1>Crear cuenta</h1>
      <p>
        Regístrate para crear, editar y organizar tus notas desde un solo lugar.
      </p>
    </div>

    <form id="registerForm" class="form">
      <label for="name">Nombre</label>
      <input
        id="name"
        name="name"
        type="text"
        autocomplete="name"
        placeholder="Tu nombre"
        minlength="2"
        maxlength="80"
        required
      >

      <label for="email">Correo electrónico</label>
      <input
        id="email"
        name="email"
        type="email"
        autocomplete="email"
        placeholder="nombre@correo.com"
        required
      >

      <label for="password">Contraseña</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="new-password"
        placeholder="Crea una contraseña"
        minlength="6"
        required
      >

      <p class="field-help">
        Utiliza al menos 6 caracteres.
      </p>

      <button
        class="button primary full-width auth-submit-button"
        type="submit"
      >
        Crear cuenta
      </button>

      <p
        id="message"
        class="message"
        role="status"
        aria-live="polite"
      ></p>
    </form>

    <p class="auth-switch">
      ¿Ya tienes una cuenta?
      <a href="login.html">Inicia sesión</a>
    </p>
  </main>

  <script src="js/api.js?v=5"></script>
  <script src="js/auth.js?v=5"></script>
</body>
</html>
