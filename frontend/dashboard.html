<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Noty</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="dashboard-page">
  <div class="app-shell">

    <aside class="sidebar">
      <div class="sidebar-header">
        <div>
          <p class="eyebrow">Mis notas</p>
          <h1>Noty</h1>
        </div>
      </div>

      <button
        id="newNoteButton"
        class="button primary full-width"
        type="button"
      >
        + Nueva nota
      </button>

      <div class="search-wrapper">
        <label class="sr-only" for="notesSearch">Buscar notas</label>
        <input
          id="notesSearch"
          class="search-input"
          type="search"
          placeholder="Buscar notas..."
          autocomplete="off"
        >
      </div>

      <div
        id="notesList"
        class="notes-list"
        aria-label="Lista de notas"
      ></div>

      <button
        id="logoutButton"
        class="button secondary full-width logout-button"
        type="button"
      >
        Cerrar sesión
      </button>
    </aside>

    <main class="editor-panel">
      <header class="editor-topbar">
        <div class="title-area">
          <label class="sr-only" for="noteTitle">Título de la nota</label>
          <input
            id="noteTitle"
            class="title-input"
            type="text"
            placeholder="Título de la nota"
            maxlength="120"
          >

          <p
            id="saveStatus"
            class="save-status"
            aria-live="polite"
          >
            Sin cambios
          </p>
        </div>

        <div class="editor-actions">
          <button
            id="saveNoteButton"
            class="button primary"
            type="button"
          >
            Guardar
          </button>

          <button
            id="exportPdfButton"
            class="button secondary"
            type="button"
          >
            Exportar PDF
          </button>

          <button
            id="deleteNoteButton"
            class="button danger"
            type="button"
          >
            Eliminar
          </button>
        </div>
      </header>

      <nav class="toolbar" aria-label="Barra de formato">
        <button
          data-command="formatBlock"
          data-value="h1"
          type="button"
          title="Título principal"
          aria-label="Aplicar título principal"
        >
          H1
        </button>

        <button
          data-command="formatBlock"
          data-value="h2"
          type="button"
          title="Subtítulo"
          aria-label="Aplicar subtítulo"
        >
          H2
        </button>

        <button
          data-command="formatBlock"
          data-value="h3"
          type="button"
          title="Encabezado pequeño"
          aria-label="Aplicar encabezado pequeño"
        >
          H3
        </button>

        <span class="toolbar-divider" aria-hidden="true"></span>

        <button
          data-command="bold"
          type="button"
          title="Negrita"
          aria-label="Aplicar negrita"
        >
          <strong>B</strong>
        </button>

        <button
          data-command="italic"
          type="button"
          title="Cursiva"
          aria-label="Aplicar cursiva"
        >
          <em>I</em>
        </button>

        <span class="toolbar-divider" aria-hidden="true"></span>

        <button
          data-command="insertUnorderedList"
          type="button"
          title="Lista con viñetas"
          aria-label="Crear lista con viñetas"
        >
          • Lista
        </button>

        <button
          data-command="insertOrderedList"
          type="button"
          title="Lista numerada"
          aria-label="Crear lista numerada"
        >
          1. Lista
        </button>

        <button
          data-command="formatBlock"
          data-value="p"
          type="button"
          title="Texto normal"
          aria-label="Aplicar formato de párrafo"
        >
          Párrafo
        </button>
      </nav>

      <section
        id="noteEditor"
        class="note-editor"
        contenteditable="true"
        data-placeholder="Escribe tu nota aquí..."
        aria-label="Editor de contenido"
        spellcheck="true"
      ></section>

      <p
        id="message"
        class="message"
        role="status"
        aria-live="polite"
      ></p>
    </main>
  </div>

  <!-- Modal para crear nota -->
  <div
    id="newNoteModal"
    class="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="newNoteModalTitle"
    hidden
  >
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Crear contenido</p>
          <h2 id="newNoteModalTitle">Nueva nota</h2>
        </div>

        <button
          class="modal-close"
          type="button"
          data-close-modal="newNoteModal"
          aria-label="Cerrar"
        >
          ×
        </button>
      </div>

      <form id="newNoteForm" class="modal-form">
        <label for="newNoteTitle">Título de la nota</label>

        <input
          id="newNoteTitle"
          type="text"
          maxlength="120"
          placeholder="Ejemplo: Lista del supermercado"
          autocomplete="off"
          required
        >

        <p class="field-help">
          Podrás cambiar el título después.
        </p>

        <div class="modal-actions">
          <button
            class="button secondary"
            type="button"
            data-close-modal="newNoteModal"
          >
            Cancelar
          </button>

          <button class="button primary" type="submit">
            Crear nota
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal para eliminar nota -->
  <div
    id="deleteNoteModal"
    class="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="deleteModalTitle"
    hidden
  >
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <p class="eyebrow danger-text">Acción permanente</p>
          <h2 id="deleteModalTitle">Eliminar nota</h2>
        </div>

        <button
          class="modal-close"
          type="button"
          data-close-modal="deleteNoteModal"
          aria-label="Cerrar"
        >
          ×
        </button>
      </div>

      <p class="modal-copy">
        ¿Deseas eliminar la nota
        <strong id="deleteNoteName">seleccionada</strong>?
      </p>

      <p class="modal-warning">
        Esta acción no se puede deshacer.
      </p>

      <div class="modal-actions">
        <button
          class="button secondary"
          type="button"
          data-close-modal="deleteNoteModal"
        >
          Cancelar
        </button>

        <button
          id="confirmDeleteButton"
          class="button danger"
          type="button"
        >
          Eliminar nota
        </button>
      </div>
    </div>
  </div>

  <script src="js/notes.js" defer></script>
</body>
</html>
